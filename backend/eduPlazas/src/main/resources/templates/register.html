<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - EduPlazas</title>

    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <style>
        h1 {
            font-size: 42px;
            font-weight: 800;
            margin: 0;
            color: #d88a00;
            text-align: left;
        }

        .register-form {
            margin-top: 18px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 19px;
            font-weight: 500;
            color: #111;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .form-group input {
            width: 100%;
            height: 46px;
            padding: 10px 14px;
            border: 1.5px solid #bdbdbd;
            border-radius: 12px;
            font-size: 15px;
            background-color: #f9f9f9;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e58d00;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(229, 141, 0, 0.15);
        }

        .form-group input:invalid:not(:placeholder-shown) {
            border-color: #b90707;
            background-color: #fff7f7;
        }

        .form-group input:valid:not(:placeholder-shown) {
            border-color: #3f8f5f;
            background-color: #f8fff9;
        }

        .form-help {
            display: block;
            margin-top: 6px;
            font-size: 13px;
            color: #666;
            line-height: 1.3;
        }

        .double-group {
            display: flex;
            gap: 20px;
        }

        .half {
            width: 50%;
        }

        .password-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .password-label-row label {
            margin-bottom: 0;
        }

        .eye-icon {
            font-size: 20px;
            color: #999;
            line-height: 1;
        }

        .btn {
            display: block;
            width: 100%;
            margin-top: 18px;
            padding: 13px;
            background-color: #e58d00;
            color: white;
            border: none;
            text-decoration: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
        }

        .btn:hover {
            background-color: #c77400;
        }

        @media (max-width: 900px) {
            .double-group {
                flex-direction: column;
                gap: 0;
            }

            .half {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="left">
        <div class="card">
            <div class="top-text">
                <div class="welcome-block">
                    <p class="welcome">Bienvenido a</p>
                    <h1>EduPlazas</h1>
                </div>

                <div class="register-block">
                    <p>¿Ya tienes cuenta?</p>
                    <a th:href="@{/login}" class="register-link">Inicia sesión</a>
                </div>
            </div>

            <form th:action="@{/register}" th:object="${usuario}" method="post" class="register-form">
                <div class="form-group">
                    <label for="email">Introduzca su correo electrónico</label>
                    <input
                        type="email"
                        id="email"
                        th:field="*{email}"
                        placeholder="Correo electrónico"
                        autocomplete="email"
                        maxlength="100"
                        required
                        title="Introduce un correo electrónico válido. Ejemplo: usuario@dominio.com">
                    <small class="form-help">Formato esperado: usuario@dominio.com</small>
                </div>

                <div class="double-group">
                    <div class="form-group half">
                        <label for="nombreCompleto">Nombre del usuario</label>
                        <input
                            type="text"
                            id="nombreCompleto"
                            th:field="*{nombreCompleto}"
                            placeholder="Ej. Familia López"
                            autocomplete="name"
                            minlength="3"
                            maxlength="80"
                            pattern="[A-Za-zÁÉÍÓÚáéíóúÑñÜü\s]+"
                            required
                            title="El nombre solo puede contener letras y espacios, entre 3 y 80 caracteres.">
                        <small class="form-help">Solo letras y espacios. Entre 3 y 80 caracteres.</small>
                    </div>

                    <div class="form-group half">
                        <label for="telefono">Número de teléfono</label>
                        <input
                            type="tel"
                            id="telefono"
                            name="telefono"
                            placeholder="Ej. 612345678"
                            autocomplete="tel"
                            pattern="[0-9]{9}"
                            maxlength="9"
                            title="Introduce un número de teléfono de 9 dígitos.">
                        <small class="form-help">Debe contener 9 dígitos. Ejemplo: 612345678.</small>
                    </div>
                </div>

                <div class="form-group">
                    <div class="password-label-row">
                        <label for="password">Introduzca su contraseña</label>
                        <span class="eye-icon" aria-hidden="true">👁</span>
                    </div>
                    <input
                        type="password"
                        id="password"
                        th:field="*{password}"
                        placeholder="Contraseña"
                        autocomplete="new-password"
                        minlength="6"
                        maxlength="50"
                        pattern="^(?=.*[0-9])(?=.*[^A-Za-z0-9]).{6,50}$"
                        required
                        title="La contraseña debe tener entre 6 y 50 caracteres, al menos un número y un carácter especial.">
                    <small class="form-help">Debe tener entre 6 y 50 caracteres, al menos un número y un carácter especial.</small>
                </div>

                <button type="submit" class="btn">Registrarme</button>
            </form>
        </div>
    </div>

    <div class="right">
        <img th:src="@{/images/login.png}" alt="Imagen decorativa de registro en EduPlazas">
    </div>

</body>
</html>
