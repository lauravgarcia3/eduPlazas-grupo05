<!DOCTYPE html>
<html>
<head>
    <title>Formulario de Solicitud</title>
</head>
<body>

    <h1>Nueva solicitud</h1>

    <h2>Datos del menor</h2>
    <form action="/solicitante/solicitud" method="post">
        <label for="nombre">Nombre:</label><br>
        <input type="text" id="nombre" name="nombre"><br><br>

        <label for="apellidos">Apellidos:</label><br>
        <input type="text" id="apellidos" name="apellidos"><br><br>

        <label for="fechaNacimiento">Fecha de nacimiento:</label><br>
        <input type="date" id="fechaNacimiento" name="fechaNacimiento"><br><br>

        <h2>Preferencias de centro</h2>

        <label for="centro1">Primera opción:</label><br>
        <input type="text" id="centro1" name="centro1"><br><br>

        <label for="centro2">Segunda opción:</label><br>
        <input type="text" id="centro2" name="centro2"><br><br>

        <label for="centro3">Tercera opción:</label><br>
        <input type="text" id="centro3" name="centro3"><br><br>

        <h2>Documentación</h2>

        <label for="documentacion">Adjuntar documentación:</label><br>
        <input type="file" id="documentacion" name="documentacion"><br><br>

        <button type="submit">Enviar solicitud</button>
    </form>

    <br>
    <a href="/solicitante/home">Volver al área del solicitante</a>

</body>
</html>
