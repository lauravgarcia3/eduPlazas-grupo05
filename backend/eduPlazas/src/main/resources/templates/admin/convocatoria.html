<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Convocatorias</title>
</head>
<body>
<h1>Convocatorias</h1>

<p><a th:href="@{/admin/convocatoria/nueva}">Crear nueva convocatoria</a></p>

<table border="1">
    <tr>
        <th>Nombre</th>
        <th>Fecha inicio</th>
        <th>Fecha fin</th>
        <th>Plazas totales</th>
    </tr>
    <tr th:each="conv : ${convocatorias}">
        <td th:text="${conv.nombre}">Nombre</td>
        <td th:text="${conv.fechaInicio}">Fecha inicio</td>
        <td th:text="${conv.fechaFin}">Fecha fin</td>
        <td th:text="${conv.plazasTotales}">Plazas</td>
    </tr>
</table>

</body>
</html>
